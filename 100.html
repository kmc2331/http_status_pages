<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Continue</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:sans-serif;

    background:linear-gradient(
        180deg,
        #b8e8ff 0%,
        #7fd1ff 50%,
        #4db8ff 100%
    );
}

.pool{
    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        0deg,
        rgba(255,255,255,.2) 0px,
        rgba(255,255,255,.2) 2px,
        transparent 2px,
        transparent 60px
    ),
    repeating-linear-gradient(
        90deg,
        rgba(255,255,255,.2) 0px,
        rgba(255,255,255,.2) 2px,
        transparent 2px,
        transparent 60px
    );
}

.water{
    position:absolute;
    inset:0;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,.4), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,.3), transparent 40%);

    animation:wave 5s ease-in-out infinite;
}

@keyframes wave{
    50%{
        transform:translateY(-10px);
    }
}

.code{
    position:absolute;
    top:38%;
    left:50%;
    transform:translate(-50%,-50%);

    font-size:220px;
    font-weight:bold;
    color:white;

    text-shadow:
        0 0 20px rgba(255,255,255,.6),
        0 0 40px rgba(0,0,0,.15);
}

.message{
    position:absolute;
    top:55%;
    left:50%;
    transform:translateX(-50%);

    text-align:center;
    color:white;
}

.message h2{
    font-size:48px;
    margin-bottom:12px;
}

.message p{
    font-size:22px;
    line-height:1.6;
}

.duck{
    position:absolute;
    font-size:80px;
    animation:float 4s ease-in-out infinite;
}

@keyframes float{
    50%{
        transform:translateY(-15px);
    }
}

.d1{top:12%; left:10%;}
.d2{top:18%; right:12%; animation-delay:1s;}
.d3{top:40%; left:8%; animation-delay:2s;}
.d4{top:35%; right:10%; animation-delay:.5s;}
.d5{bottom:12%; left:18%; animation-delay:1.5s;}
.d6{bottom:10%; right:18%; animation-delay:2.5s;}

.button{
    position:absolute;
    bottom:50px;
    left:50%;
    transform:translateX(-50%);
}

.button a{
    text-decoration:none;
    color:#0077cc;

    background:white;
    padding:15px 35px;

    border-radius:30px;
    font-weight:bold;

    box-shadow:0 5px 20px rgba(0,0,0,.15);
}
</style>

</head>

<body>

<div class="pool"></div>
<div class="water"></div>

<div class="duck d1">🦆</div>
<div class="duck d2">🦆</div>
<div class="duck d3">🐥</div>
<div class="duck d4">🦆</div>
<div class="duck d5">🐥</div>
<div class="duck d6">🦆</div>

<div class="code">100</div>

<div class="message">
    <h2>Ready to Swim!</h2>
    <p>
        リクエストを受け取りました。<br>
        準備完了、そのまま進んでください！
    </p>
</div>

<div class="button">
    <a href="/">Continue →</a>
</div>

</body>
</html>
